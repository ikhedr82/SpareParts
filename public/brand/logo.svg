    <rect x="32" y="14" width="4" height="3" rx="0.5" fill="#10B981" transform="rotate(45, 34, 15.5)"/>
    <rect x="33" y="19" width="4" height="3" rx="0.5" fill="#10B981" transform="rotate(75, 35, 20.5)"/>
  </g>
